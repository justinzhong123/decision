<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OCDS — 機會成本決策系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0F0F0F;
    --card:      #1A1A1A;
    --card2:     #242424;
    --card3:     #2E2E2E;
    --accent:    #F5A623;
    --accent-dim:#9B6614;
    --text:      #E5E5E5;
    --text2:     #999;
    --text3:     #555;
    --danger:    #E24B4A;
    --green:     #4CAF50;
    --blue:      #4A9EE2;
    --border:    #333;
    --radius:    12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans TC', 'IBM Plex Mono', monospace;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 28px 32px 0;
    max-width: 1100px;
    margin: 0 auto;
  }
  .header-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .header-subtitle {
    color: var(--text2);
    font-size: 0.85rem;
    margin-top: 4px;
  }
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .stat {
    font-size: 0.82rem;
    color: var(--text2);
  }
  .stat span {
    color: var(--accent);
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Main layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 32px 60px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    font-family: inherit;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.97); }
  .btn-accent  { background: var(--accent); color: #111; }
  .btn-ghost   { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger  { background: transparent; color: var(--danger); border: 1px solid #4a1c1c; }
  .btn-danger:hover { background: #2a1111; }
  .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
  .btn-icon { padding: 6px 8px; }

  /* ── Decision Cards ── */
  .decisions-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .decision-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
  }
  .decision-card:hover { border-color: #444; }

  .decision-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 16px 20px 12px;
    cursor: pointer;
    user-select: none;
    gap: 12px;
  }
  .decision-header-left { flex: 1; min-width: 0; }
  .decision-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .decision-desc {
    font-size: 0.8rem;
    color: var(--text2);
    margin-top: 2px;
  }
  .decision-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .badge {
    font-size: 0.7rem;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge-active   { background: #1a2e14; color: #4CAF50; }
  .badge-complete { background: #1a1a2e; color: #7B8FE2; }
  .badge-count    { background: var(--card3); color: var(--text2); }

  .chevron {
    color: var(--text3);
    font-size: 0.75rem;
    transition: transform .2s;
  }
  .chevron.open { transform: rotate(180deg); }

  .decision-body { display: none; }
  .decision-body.open { display: block; }

  .analyze-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 14px;
  }
  .btn-analyze {
    background: var(--card2);
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    font-size: 0.8rem;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background .15s;
  }
  .btn-analyze:hover { background: #2a1e08; }

  /* ── Options Grid ── */
  .options-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 0 20px 16px;
  }

  .option-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 220px;
    padding: 14px 16px;
    position: relative;
    transition: border-color .2s;
  }
  .option-card.important {
    border-left: 3px solid var(--accent);
  }
  .option-card.recommended {
    border-color: var(--green);
  }

  .option-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .option-desc {
    font-size: 0.72rem;
    color: var(--text2);
    margin-bottom: 10px;
    min-height: 16px;
  }
  .option-status {
    font-size: 0.7rem;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 8px;
  }
  .option-status.rec { color: var(--green); }
  .option-status.not-rec { color: var(--text3); }

  .metric {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.78rem;
    margin-bottom: 4px;
  }
  .metric-label { color: var(--text2); }
  .metric-value {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
  }
  .metric-value.cost   { color: #E24B4A; }
  .metric-value.benefit{ color: #4CAF50; }
  .metric-value.risk   { color: #F5A623; }
  .metric-value.net-pos{ color: #4CAF50; }
  .metric-value.net-neg{ color: #E24B4A; }

  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 10px;
  }
  .tag {
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 20px;
    background: var(--card3);
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
  }
  .tag.career { background: #1a2e14; color: #4CAF50; }

  .option-actions {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }

  /* Add option placeholder */
  .option-add {
    width: 220px;
    min-height: 120px;
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text3);
    font-size: 0.82rem;
    font-family: inherit;
    gap: 6px;
    transition: border-color .2s, color .2s;
  }
  .option-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Analysis Panel ── */
  .analysis-panel {
    margin: 0 20px 16px;
    background: var(--card3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: none;
  }
  .analysis-panel.open { display: block; }

  .analysis-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .analysis-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .analysis-block {
    flex: 1;
    min-width: 180px;
  }
  .analysis-block-title {
    font-size: 0.72rem;
    color: var(--text2);
    margin-bottom: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .formula-box {
    background: var(--card);
    border-radius: 8px;
    padding: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--text2);
    line-height: 1.8;
  }
  .formula-box .highlight { color: var(--accent); }
  .formula-box .rec-line  { color: var(--green); font-weight: 600; }

  .baseline-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }
  .baseline-table th {
    text-align: left;
    color: var(--text3);
    padding: 4px 8px;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
  }
  .baseline-table td {
    padding: 5px 8px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text2);
  }
  .baseline-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }

  /* ── Decision footer ── */
  .decision-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 10px 20px 14px;
    gap: 8px;
    border-top: 1px solid var(--border);
  }

  /* ── Completed section ── */
  .completed-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text2);
    font-size: 0.85rem;
    font-weight: 600;
    margin: 28px 0 14px;
    user-select: none;
  }
  .completed-toggle:hover { color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-size: 0.85rem;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 460px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 0.78rem;
    color: var(--text2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-input, .form-textarea {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 64px; }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .slider {
    -webkit-appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .slider.cost   { background: linear-gradient(to right, #E24B4A var(--val), var(--card3) var(--val)); }
  .slider.benefit{ background: linear-gradient(to right, #4CAF50 var(--val), var(--card3) var(--val)); }
  .slider.risk   { background: linear-gradient(to right, #F5A623 var(--val), var(--card3) var(--val)); }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text);
    border: 2px solid var(--card);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .slider-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    width: 24px;
    text-align: right;
    color: var(--accent);
  }

  .tags-input-row {
    display: flex;
    gap: 8px;
  }
  .tags-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .tag-removable {
    font-size: 0.7rem;
    padding: 2px 6px 2px 8px;
    border-radius: 20px;
    background: var(--card3);
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: default;
  }
  .tag-removable button {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 0.7rem;
    padding: 0;
    line-height: 1;
  }
  .tag-removable button:hover { color: var(--danger); }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.82rem;
    display: none;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  #toast.show { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Divider */
  hr.div { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:flex-start;justify-content:space-between">
    <div>
      <div class="header-title">📊 機會成本決策系統</div>
      <div class="header-subtitle">分析選項、比較機會成本，做出最佳決策</div>
    </div>
    <div style="display:flex;gap:8px">
      <a class="btn btn-ghost" href="/api/export.csv">⬇ 匯出 CSV</a>
      <a class="btn btn-ghost" href="/dashboard">📈 決策總覽</a>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat">▌ 進行中 <span id="stat-active">0</span></div>
    <div class="stat">✓ 已完成 <span id="stat-done">0</span></div>
    <div class="stat">♡ 已標記 <span id="stat-marked">0</span></div>
  </div>
</header>

<main>
  <!-- Active decisions -->
  <div class="section-header">
    <span class="section-title">決策列表</span>
    <button class="btn btn-accent" onclick="openNewDecisionModal()">＋ 新增決策</button>
  </div>
  <div class="decisions-list" id="active-decisions"></div>
  <div class="empty-state" id="empty-active" style="display:none">
    <div class="icon">🗂</div>
    <div>尚無進行中的決策</div>
    <div style="margin-top:6px;color:var(--text3);font-size:.75rem">點擊「新增決策」開始第一個決策</div>
  </div>

  <!-- Completed decisions -->
  <div class="completed-toggle" onclick="toggleCompleted()" id="completed-toggle" style="display:none">
    <span id="completed-chevron">▶</span>
    <span>已完成決策</span>
    <span class="badge badge-complete" id="completed-count">0</span>
  </div>
  <div id="completed-decisions" style="display:none"></div>
</main>

<!-- ── New Decision Modal ── -->
<div class="modal-overlay" id="modal-decision">
  <div class="modal">
    <div class="modal-title">新增決策</div>
    <div class="form-group">
      <label class="form-label">決策主題 *</label>
      <input class="form-input" id="d-title" placeholder="例：學校 vs 打工" />
    </div>
    <div class="form-group">
      <label class="form-label">描述</label>
      <textarea class="form-textarea" id="d-desc" placeholder="描述這個決策的背景..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-decision')">取消</button>
      <button class="btn btn-accent" onclick="submitDecision()">建立決策</button>
    </div>
  </div>
</div>

<!-- ── Option Modal ── -->
<div class="modal-overlay" id="modal-option">
  <div class="modal">
    <div class="modal-title" id="option-modal-title">新增選項</div>
    <div class="form-group">
      <label class="form-label">選項名稱 *</label>
      <input class="form-input" id="o-name" placeholder="例：上課" />
    </div>
    <div class="form-group">
      <label class="form-label">描述</label>
      <input class="form-input" id="o-desc" placeholder="簡短說明..." />
    </div>
    <hr class="div" />
    <div class="form-group">
      <label class="form-label">↘ 成本（顯性支出 + 生理疲累）</label>
      <div class="slider-group">
        <input type="range" min="1" max="10" value="5" class="slider cost" id="o-cost"
               oninput="updateSlider(this,'o-cost-val')" style="--val:44%" />
        <span class="slider-val" id="o-cost-val">5</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">↗ 收益（即時經濟 + 長期知識成長）</label>
      <div class="slider-group">
        <input type="range" min="1" max="10" value="5" class="slider benefit" id="o-benefit"
               oninput="updateSlider(this,'o-benefit-val')" style="--val:44%" />
        <span class="slider-val" id="o-benefit-val">5</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">△ 風險（學分流失 / 工作失誤）</label>
      <div class="slider-group">
        <input type="range" min="1" max="10" value="5" class="slider risk" id="o-risk"
               oninput="updateSlider(this,'o-risk-val')" style="--val:44%" />
        <span class="slider-val" id="o-risk-val">5</span>
      </div>
    </div>
    <hr class="div" />
    <div class="form-group">
      <label class="form-label">標籤</label>
      <div class="tags-input-row">
        <input class="form-input" id="o-tag-input" placeholder="#學業 / #打工 / #社交..."
               onkeydown="handleTagKey(event)" />
        <button class="btn btn-ghost btn-sm" onclick="addTagFromInput()">加入</button>
      </div>
      <div class="tags-preview" id="o-tags-preview"></div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.82rem;color:var(--text2)">
        <input type="checkbox" id="o-important" style="accent-color:var(--accent)" />
        標記為重要項目
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-option')">取消</button>
      <button class="btn btn-accent" onclick="submitOption()">儲存選項</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let decisions = [];
let completedOpen = false;
let currentDecisionId = null;   // for adding options
let editingOptionId = null;      // null = new, string = editing
let optionTags = [];

const CAREER_TAGS = ['#專業課', '#實習', '#專案開發'];

// ── Fetch with retry ───────────────────────────────────────────────────────
async function apiFetch(url, opts = {}, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const res = await fetch(url, opts);
      return res;
    } catch (e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, 800 * (i + 1))); // 0.8s → 1.6s back-off
    }
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadDecisions);

async function loadDecisions() {
  try {
    const res = await apiFetch('/api/decisions');
    if (!res.ok) throw new Error(`伺服器錯誤 ${res.status}`);
    decisions = await res.json();
    render();
  } catch (e) {
    console.error('loadDecisions failed:', e);
    showToast('⚠ 載入失敗：' + e.message, true);
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const active    = decisions.filter(d => d.status === 'active');
  const completed = decisions.filter(d => d.status === 'completed');
  const marked    = decisions.flatMap(d => d.options || []).filter(o => o.is_important).length;

  document.getElementById('stat-active').textContent = active.length;
  document.getElementById('stat-done').textContent   = completed.length;
  document.getElementById('stat-marked').textContent = marked;

  const activeEl = document.getElementById('active-decisions');
  activeEl.innerHTML = active.map(d => renderDecisionCard(d)).join('');
  document.getElementById('empty-active').style.display = active.length ? 'none' : 'block';

  const toggleEl = document.getElementById('completed-toggle');
  const countEl  = document.getElementById('completed-count');
  if (completed.length) {
    toggleEl.style.display = 'flex';
    countEl.textContent = completed.length;
    const doneEl = document.getElementById('completed-decisions');
    doneEl.innerHTML = completed.map(d => renderDecisionCard(d, true)).join('');
  } else {
    toggleEl.style.display = 'none';
  }
}

function renderDecisionCard(d, isCompleted = false) {
  const opts = d.options || [];
  const optCount = opts.length;

  return `
  <div class="decision-card" id="card-${d.id}">
    <div class="decision-header" onclick="toggleCard('${d.id}')">
      <div class="decision-header-left">
        <div class="decision-title">${esc(d.title)}</div>
        ${d.description ? `<div class="decision-desc">${esc(d.description)}</div>` : ''}
      </div>
      <div class="decision-meta">
        <span class="badge ${isCompleted ? 'badge-complete' : 'badge-active'}">${isCompleted ? '已完成' : '進行中'}</span>
        <span class="badge badge-count">${optCount} 選項</span>
        <span class="chevron" id="chevron-${d.id}">▼</span>
      </div>
    </div>

    <div class="decision-body" id="body-${d.id}">
      <div class="analyze-bar">
        <button class="btn-analyze" onclick="analyzeDecision('${d.id}',event)">
          ▌ 顯示機會成本分析
        </button>
      </div>

      <!-- Analysis panel -->
      <div class="analysis-panel" id="analysis-${d.id}"></div>

      <!-- Options -->
      <div class="options-grid" id="opts-${d.id}">
        ${opts.map(o => renderOptionCard(o, isCompleted)).join('')}
        ${!isCompleted ? `
        <button class="option-add" onclick="openNewOptionModal('${d.id}')">
          ＋ 新增選項
        </button>` : ''}
      </div>

      ${!isCompleted ? `
      <div class="decision-footer">
        <button class="btn btn-ghost btn-sm" onclick="completeDecision('${d.id}')">✓ 完成決策</button>
        <button class="btn btn-danger btn-sm" onclick="deleteDecision('${d.id}')">🗑 刪除決策</button>
      </div>` : ''}
    </div>
  </div>`;
}

function renderOptionCard(o, readOnly = false) {
  const netClass = (o.net_value != null)
    ? (o.net_value >= 0 ? 'net-pos' : 'net-neg')
    : '';
  const netText = o.net_value != null
    ? (o.net_value >= 0 ? `+${o.net_value}` : `${o.net_value}`)
    : '—';
  const statusText = o.recommended === true
    ? '★ 推薦選擇'
    : o.recommended === false ? '未推薦' : '未分析';
  const statusClass = o.recommended === true ? 'rec' : 'not-rec';

  const tagHtml = (o.tags || []).map(t => {
    const cls = CAREER_TAGS.includes(t) ? 'career' : '';
    return `<span class="tag ${cls}">${esc(t)}</span>`;
  }).join('');

  return `
  <div class="option-card ${o.is_important ? 'important' : ''} ${o.recommended ? 'recommended' : ''}"
       id="opt-${o.id}">
    <div class="option-name">${esc(o.name)}</div>
    <div class="option-desc">${esc(o.description || '')}</div>
    <div class="option-status ${statusClass}">${statusText}</div>
    <div class="metric">
      <span class="metric-label">↘ 成本</span>
      <span class="metric-value cost">${o.cost}</span>
    </div>
    <div class="metric">
      <span class="metric-label">↗ 收益</span>
      <span class="metric-value benefit">${o.benefit}</span>
    </div>
    <div class="metric">
      <span class="metric-label">△ 風險</span>
      <span class="metric-value risk">${o.risk}</span>
    </div>
    ${o.net_value != null ? `
    <div class="metric" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
      <span class="metric-label">淨值</span>
      <span class="metric-value ${netClass}">${netText}</span>
    </div>` : ''}
    ${tagHtml ? `<div class="tags-row">${tagHtml}</div>` : ''}
    ${!readOnly ? `
    <div class="option-actions">
      <button class="btn btn-ghost btn-sm" onclick="openEditOptionModal('${o.id}',event)">編輯</button>
      <button class="btn btn-danger btn-sm" onclick="deleteOption('${o.id}','${o.decision_id}',event)">刪除</button>
    </div>` : ''}
  </div>`;
}

// ── Toggle helpers ─────────────────────────────────────────────────────────
function toggleCard(did) {
  const body    = document.getElementById(`body-${did}`);
  const chevron = document.getElementById(`chevron-${did}`);
  const open    = body.classList.toggle('open');
  chevron.classList.toggle('open', open);
}

function toggleCompleted() {
  completedOpen = !completedOpen;
  document.getElementById('completed-decisions').style.display = completedOpen ? 'flex' : 'none';
  document.getElementById('completed-decisions').style.flexDirection = 'column';
  document.getElementById('completed-decisions').style.gap = '16px';
  document.getElementById('completed-chevron').textContent = completedOpen ? '▼' : '▶';
}

// ── Decision CRUD ──────────────────────────────────────────────────────────
function openNewDecisionModal() {
  document.getElementById('d-title').value = '';
  document.getElementById('d-desc').value  = '';
  openModal('modal-decision');
}

async function submitDecision() {
  const title = document.getElementById('d-title').value.trim();
  if (!title) { showToast('請輸入決策主題'); return; }
  const btn = document.querySelector('#modal-decision .btn-accent');
  setLoading(btn, true, '建立中…');
  try {
    const res = await apiFetch('/api/decisions', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title, description: document.getElementById('d-desc').value.trim() })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `伺服器錯誤 ${res.status}`);
    }
    const d = await res.json();
    closeModal('modal-decision');
    await loadDecisions();
    showToast('✓ 決策已建立');
    setTimeout(() => {
      const body = document.getElementById(`body-${d.id}`);
      if (body && !body.classList.contains('open')) toggleCard(d.id);
    }, 80);
  } catch (e) {
    console.error('submitDecision failed:', e);
    showToast('⚠ 新增失敗：' + e.message, true);
  } finally {
    setLoading(btn, false, '建立決策');
  }
}

async function deleteDecision(did) {
  if (!confirm('確定刪除此決策？')) return;
  try {
    const res = await apiFetch(`/api/decisions/${did}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`伺服器錯誤 ${res.status}`);
    await loadDecisions();
    showToast('✓ 決策已刪除');
  } catch (e) {
    showToast('⚠ 刪除失敗：' + e.message, true);
  }
}

async function completeDecision(did) {
  if (!confirm('標記為已完成？')) return;
  try {
    const res = await apiFetch(`/api/decisions/${did}/complete`, { method: 'POST' });
    if (!res.ok) throw new Error(`伺服器錯誤 ${res.status}`);
    await loadDecisions();
    showToast('✓ 決策已完成');
  } catch (e) {
    showToast('⚠ 操作失敗：' + e.message, true);
  }
}

// ── Option CRUD ─────────────────────────────────────────────────────────────
function openNewOptionModal(did) {
  currentDecisionId = did;
  editingOptionId   = null;
  optionTags        = [];
  document.getElementById('option-modal-title').textContent = '新增選項';
  document.getElementById('o-name').value        = '';
  document.getElementById('o-desc').value        = '';
  document.getElementById('o-important').checked = false;
  setSlider('o-cost',    5);
  setSlider('o-benefit', 5);
  setSlider('o-risk',    5);
  renderTagsPreview();
  openModal('modal-option');
}

function openEditOptionModal(oid, e) {
  if (e) e.stopPropagation();
  const d = decisions.find(d => (d.options||[]).some(o => o.id === oid));
  if (!d) return;
  const o = d.options.find(o => o.id === oid);
  editingOptionId   = oid;
  currentDecisionId = d.id;
  optionTags        = [...(o.tags || [])];
  document.getElementById('option-modal-title').textContent = '編輯選項';
  document.getElementById('o-name').value        = o.name;
  document.getElementById('o-desc').value        = o.description || '';
  document.getElementById('o-important').checked = !!o.is_important;
  setSlider('o-cost',    o.cost);
  setSlider('o-benefit', o.benefit);
  setSlider('o-risk',    o.risk);
  renderTagsPreview();
  openModal('modal-option');
}

async function submitOption() {
  const name = document.getElementById('o-name').value.trim();
  if (!name) { showToast('請輸入選項名稱'); return; }
  const payload = {
    name,
    description:  document.getElementById('o-desc').value.trim(),
    cost:         +document.getElementById('o-cost').value,
    benefit:      +document.getElementById('o-benefit').value,
    risk:         +document.getElementById('o-risk').value,
    is_important: document.getElementById('o-important').checked ? 1 : 0,
    tags:         optionTags,
  };

  const btn = document.querySelector('#modal-option .btn-accent');
  setLoading(btn, true, '儲存中…');
  try {
    let res;
    if (editingOptionId) {
      res = await apiFetch(`/api/options/${editingOptionId}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
    } else {
      res = await apiFetch(`/api/decisions/${currentDecisionId}/options`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `伺服器錯誤 ${res.status}`);
    }

    const did = currentDecisionId;
    closeModal('modal-option');
    await loadDecisions();
    showToast(editingOptionId ? '✓ 選項已更新' : '✓ 選項已新增');
    setTimeout(() => {
      const body = document.getElementById(`body-${did}`);
      if (body && !body.classList.contains('open')) toggleCard(did);
    }, 40);
  } catch (e) {
    console.error('submitOption failed:', e);
    showToast('⚠ 儲存失敗：' + e.message, true);
  } finally {
    setLoading(btn, false, '儲存選項');
  }
}

async function deleteOption(oid, did, e) {
  if (e) e.stopPropagation();
  if (!confirm('確定刪除此選項？')) return;
  await apiFetch(`/api/options/${oid}`, { method: 'DELETE' });
  const d = decisions.find(d => d.id === did);
  if (d) d.options = d.options.filter(o => o.id !== oid);
  render();
  showToast('選項已刪除');
  setTimeout(() => {
    if (document.getElementById(`body-${did}`) && !document.getElementById(`body-${did}`).classList.contains('open'))
      toggleCard(did);
  }, 40);
}

// ── Analysis ───────────────────────────────────────────────────────────────
async function analyzeDecision(did, e) {
  if (e) e.stopPropagation();
  const d = decisions.find(d => d.id === did);
  if (!d || !d.options || d.options.length < 2) {
    showToast('至少需要 2 個選項才能進行分析');
    return;
  }

  const panel = document.getElementById(`analysis-${did}`);
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    return;
  }

  panel.innerHTML = '<div style="color:var(--text3);font-size:.8rem;padding:8px">計算中…</div>';
  panel.classList.add('open');

  const res  = await apiFetch(`/api/decisions/${did}/analyze`);
  const data = await res.json();

  // Update local option data with recommended/net_value
  if (d) {
    d.options = d.options.map(o => {
      const analyzed = data.options.find(ao => ao.id === o.id);
      return analyzed ? { ...o, ...analyzed } : o;
    });
  }

  renderAnalysisPanel(panel, data, d);
  // Re-render options grid without closing card
  document.getElementById(`opts-${did}`).innerHTML =
    d.options.map(o => renderOptionCard(o)).join('') +
    `<button class="option-add" onclick="openNewOptionModal('${did}')">＋ 新增選項</button>`;
}

function renderAnalysisPanel(panel, data, d) {
  const opts = data.options;
  const baselines = data.baselines || {};

  const formulaLines = opts.map(o => {
    const ws = o.weighted_score;
    const hasCareer = (o.tags || []).some(t => CAREER_TAGS.includes(t));
    const raw = (o.benefit - o.cost - o.risk).toFixed(1);
    const wNote = hasCareer ? ` × 1.25 (職涯加權)` : '';
    const recMark = o.recommended ? ' ← 推薦' : '';
    return `<div class="${o.recommended ? 'rec-line' : ''}">` +
      `${esc(o.name)}: (${o.benefit}-${o.cost}-${o.risk})=${raw}${wNote} → ` +
      `<span class="highlight">加權=${ws}</span>  淨值=${o.net_value >= 0 ? '+' : ''}${o.net_value}${recMark}</div>`;
  }).join('');

  let baselineHtml = '';
  if (Object.keys(baselines).length) {
    const rows = Object.values(baselines).map(b =>
      `<tr><td>${esc(b.tag)}</td><td>${b.count}</td><td>${b.avg_benefit}</td><td>${b.avg_cost}</td><td>${b.avg_risk}</td></tr>`
    ).join('');
    baselineHtml = `
    <div class="analysis-block" style="min-width:260px">
      <div class="analysis-block-title">// 歷史基準（同標籤移動平均）</div>
      <table class="baseline-table">
        <thead><tr><th>標籤</th><th>樣本</th><th>avg B</th><th>avg C</th><th>avg R</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  panel.innerHTML = `
  <div class="analysis-title">// 機會成本分析</div>
  <div class="analysis-row">
    <div class="analysis-block">
      <div class="analysis-block-title">// Net Value 計算過程</div>
      <div class="formula-box">${formulaLines}</div>
    </div>
    ${baselineHtml}
  </div>
  ${data.recommendation ? `
  <div style="margin-top:12px;padding:10px 14px;background:var(--card);border-left:3px solid var(--green);border-radius:6px;font-size:.82rem;color:var(--green)">
    ★ 推薦選擇：<strong>${esc(data.recommendation)}</strong>（加權淨值最高）
  </div>` : ''}`;
}

// ── Slider helpers ─────────────────────────────────────────────────────────
function updateSlider(el, valId) {
  document.getElementById(valId).textContent = el.value;
  const pct = ((el.value - 1) / 9 * 100).toFixed(0) + '%';
  el.style.setProperty('--val', pct);
}

function setSlider(id, val) {
  const el = document.getElementById(id);
  el.value = val;
  updateSlider(el, `${id}-val`);
}

// ── Tag helpers ─────────────────────────────────────────────────────────────
function handleTagKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); addTagFromInput(); }
}

function addTagFromInput() {
  let val = document.getElementById('o-tag-input').value.trim();
  if (!val) return;
  if (!val.startsWith('#')) val = '#' + val;
  if (!optionTags.includes(val)) {
    optionTags.push(val);
    renderTagsPreview();
  }
  document.getElementById('o-tag-input').value = '';
}

function removeTag(tag) {
  optionTags = optionTags.filter(t => t !== tag);
  renderTagsPreview();
}

function renderTagsPreview() {
  document.getElementById('o-tags-preview').innerHTML = optionTags.map(t =>
    `<span class="tag-removable">${esc(t)}<button onclick="removeTag('${esc(t)}')" title="移除">✕</button></span>`
  ).join('');
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.addEventListener('click', e => {
  ['modal-decision', 'modal-option'].forEach(id => {
    const overlay = document.getElementById(id);
    if (e.target === overlay) closeModal(id);
  });
});

// ── Toast ──────────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isError ? 'var(--danger)' : 'var(--border)';
  el.style.color       = isError ? 'var(--danger)' : 'var(--text)';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), isError ? 4000 : 2200);
}

// ── Util ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setLoading(btn, loading, loadingText) {
  if (!btn) return;
  if (loading) {
    btn._origText = btn.textContent;
    btn.textContent = loadingText;
    btn.disabled = true;
    btn.style.opacity = '0.6';
  } else {
    btn.textContent = btn._origText || loadingText;
    btn.disabled = false;
    btn.style.opacity = '';
  }
}
</script>
</body>
</html>
